framework:
    asset_mapper:
        # The paths to make available to the asset mapper.
        paths:
            - assets/
        excluded_patterns:
            - '%kernel.project_dir%/assets/react/node_modules/**'
            - '%kernel.project_dir%/assets/styles/node_modules/**'
        missing_import_mode: strict

when@prod:
    framework:
        asset_mapper:
            missing_import_mode: warn

react:
    controllers_path: '%kernel.project_dir%/assets/react/build'
